# ============================================================================
# WAN 2.1 T2V 14B — 2D Context Parallelism config for TPU v7-8
# ============================================================================
# v7-8 has 8 chips with DICE interconnect (6x better connectivity than ICI).
# 2D context parallelism combines Ulysses (all-to-all) with Ring (ppermute):
#   - Ulysses benefits from high-bandwidth all-to-all (ideal for DICE)
#   - Ring reduces ppermute steps from 8 to 4
#   - ulysses=2, ring=4 is the sweet spot for 8 chips on DICE topology
# ============================================================================

run_name: ''

metrics_file: ""
write_metrics: True
timing_metrics_file: ""
write_timing_metrics: True

gcs_metrics: False
save_config_to_gcs: False
log_period: 100

pretrained_model_name_or_path: 'Wan-AI/Wan2.1-T2V-14B-Diffusers'
model_name: wan2.1
model_type: 'T2V'

wan_transformer_pretrained_model_name_or_path: ''

unet_checkpoint: ''
revision: ''
weights_dtype: 'bfloat16'
activations_dtype: 'bfloat16'

replicate_vae: False
vae_spatial: -1

precision: "DEFAULT"
scan_layers: True
jit_initializers: True
from_pt: True
split_head_dim: True

# 2D context parallelism: Ulysses + Ring
attention: 'ulysses_ring'
flash_min_seq_length: 0
mask_padding_tokens: True
attention_sharding_uniform: True
dropout: 0.0

flash_block_sizes: {
  "block_q" : 512,
  "block_kv_compute" : 512,
  "block_kv" : 512,
  "block_q_dkv" : 512,
  "block_kv_dkv" : 512,
  "block_kv_dkv_compute" : 512,
  "block_q_dq" : 512,
  "block_kv_dq" : 512,
  "use_fused_bwd_kernel": False,
}

norm_num_groups: 32
train_text_encoder: False
text_encoder_learning_rate: 4.25e-6
snr_gamma: -1.0

timestep_bias: {
  strategy: "none",
  multiplier: 1.0,
  begin: 0,
  end: 1000,
  portion: 0.25
}

diffusion_scheduler_config: {
  _class_name: 'FlaxEulerDiscreteScheduler',
  prediction_type: 'epsilon',
  rescale_zero_terminal_snr: False,
  timestep_spacing: 'trailing'
}

base_output_directory: ""
hardware: 'tpu'
skip_jax_distributed_system: False

# Parallelism — v7-8 with 8 chips
mesh_axes: ['data', 'fsdp', 'context', 'tensor']

logical_axis_rules: [
                      ['batch', ['data', 'fsdp']],
                      ['activation_batch', ['data', 'fsdp']],
                      ['activation_self_attn_heads', ['context', 'tensor']],
                      ['activation_cross_attn_q_length', ['context', 'tensor']],
                      ['activation_length', 'context'],
                      ['activation_heads', 'tensor'],
                      ['mlp','tensor'],
                      ['embed', ['context', 'fsdp']],
                      ['heads', 'tensor'],
                      ['norm', 'tensor'],
                      ['conv_batch', ['data', 'context', 'fsdp']],
                      ['out_channels', 'tensor'],
                      ['conv_out', 'context'],
                    ]
vae_logical_axis_rules: [
                          ['activation_batch', 'redundant'],
                          ['activation_length', 'vae_spatial'],
                          ['activation_heads', null],
                          ['activation_kv_length', null],
                          ['embed', null],
                          ['heads', null],
                          ['norm', null],
                          ['conv_batch', 'redundant'],
                          ['out_channels', 'vae_spatial'],
                          ['conv_out', 'vae_spatial'],
                          ['conv_in', 'vae_spatial'],
                        ]
data_sharding: [['data', 'fsdp', 'context', 'tensor']]

# v7-8: 8 chips, all on ICI/DICE, single slice
dcn_data_parallelism: 1
dcn_fsdp_parallelism: 1
dcn_context_parallelism: 1
dcn_tensor_parallelism: 1
ici_data_parallelism: 1
ici_fsdp_parallelism: 1
ici_context_parallelism: 8
ici_tensor_parallelism: 1

# 2D context parallelism decomposition:
# ulysses=2 (all-to-all over DICE), ring=4 (ppermute with 4 steps)
# WAN 14B has 40 heads, 40 % 2 = 0 ✓
context_ulysses_parallelism: 2
context_ring_parallelism: 4

allow_split_physical_axes: False

dataset_name: 'diffusers/pokemon-gpt4-captions'
train_split: 'train'
dataset_type: 'tfrecord'

cache_latents_text_encoder_outputs: True
dataset_save_location: ''
load_tfrecord_cached: True
train_data_dir: ''
dataset_config_name: ''
jax_cache_dir: ''
hf_data_dir: ''
hf_train_files: ''
hf_access_token: ''
image_column: 'image'
caption_column: 'text'
resolution: 1024
center_crop: False
random_flip: False
tokenize_captions_num_proc: 4
transform_images_num_proc: 4
reuse_example_batch: False
enable_data_shuffling: True

remat_policy: "NONE"
names_which_can_be_saved: []
names_which_can_be_offloaded: []

checkpoint_every: -1
checkpoint_dir: ""
enable_single_replica_ckpt_restoring: False

learning_rate: 1.e-5
scale_lr: False
max_train_samples: -1
max_train_steps: 1500
num_train_epochs: 1
seed: 0
output_dir: 'sdxl-model-finetuned'
per_device_batch_size: 1.0
global_batch_size: 0
disable_training_weights: False

tfrecords_dir: ''
no_records_per_shard: 0
enable_eval_timesteps: False
timesteps_list: [125, 250, 375, 500, 625, 750, 875]
num_eval_samples: 420

warmup_steps_fraction: 0.1
learning_rate_schedule_steps: -1
save_optimizer: False

adam_b1: 0.9
adam_b2: 0.999
adam_eps: 1.e-8
adam_weight_decay: 0.0
opt_enable_grad_clipping: False
max_grad_value: 1.0
opt_enable_grad_global_norm_clipping: False
max_grad_norm: 1.0

enable_profiler: False
skip_first_n_steps_for_profiler: 5
profiler_steps: 10
enable_jax_named_scopes: False

