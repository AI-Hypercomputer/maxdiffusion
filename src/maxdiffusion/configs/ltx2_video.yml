#hardware
hardware: 'tpu'
skip_jax_distributed_system: False
attention: 'flash'  # Supported attention: dot_product, flash, tokamax_flash, cudnn_flash_te, ring, tokamax_ring, ulysses, ulysses_custom, ulysses_ring 
use_base2_exp: False
use_experimental_scheduler: False
# For attention=ulysses_ring, hidden Ulysses shard count; ring shards are context / this.
ulysses_shards: -1
# Splits Ulysses all-to-all into head-group chunks. The last chunk carries any remainder.
ulysses_attention_chunks: 1
a2v_attention_kernel: 'dot_product'
v2a_attention_kernel: 'dot_product'
attention_sharding_uniform: True 
precision: 'bf16'

# For scanning transformer layers
scan_layers: True

# For scanning diffusion loop
scan_diffusion_loop: True

names_which_can_be_saved: []
names_which_can_be_offloaded: []
remat_policy: "NONE"

jax_cache_dir: ''
weights_dtype: 'bfloat16'
activations_dtype: 'bfloat16'
text_encoder_dtype: 'bfloat16'
compile_text_encoder: False
use_batched_text_encoder: False

run_name: 'ltx2_inference'
output_dir: ''
base_output_directory: ''
config_path: ''
save_config_to_gcs: False

#Checkpoints
max_sequence_length: 1024
sampler: "from_checkpoint"

# Generation parameters
global_batch_size_to_train_on: 1
num_inference_steps: 40
guidance_scale: 3.0
guidance_rescale: 0.0
audio_guidance_scale: 0.0
audio_guidance_rescale: 0.0
stg_scale: 0.0
audio_stg_scale: 0.0
modality_scale: 1.0
audio_modality_scale: 1.0
use_cross_timestep: false
spatio_temporal_guidance_blocks: []
noise_scale: 1.0
fps: 24
pipeline_type: multi-scale
prompt: "A man in a brightly lit room talks on a vintage telephone. In a low, heavy voice, he says, 'I understand. I won't call again. Goodbye.' He hangs up the receiver and looks down with a sad expression. He holds the black rotary phone to his right ear with his right hand, his left hand holding a rocks glass with amber liquid. He wears a brown suit jacket over a white shirt, and a gold ring on his left ring finger. His short hair is neatly combed, and he has light skin with visible wrinkles around his eyes. The camera remains stationary, focused on his face and upper body. The room is brightly lit by a warm light source off-screen to the left, casting shadows on the wall behind him. The scene appears to be from a dramatic movie."
negative_prompt: "shaky, glitchy, low quality, worst quality, deformed, distorted, disfigured, motion smear, motion artifacts, fused fingers, bad anatomy, weird hand, ugly, transition, static."
height: 512
width: 768
decode_timestep: 0.05
decode_noise_scale: 0.025
num_frames: 121
quantization: "int8"
seed: 10
#parallelism
mesh_axes: ['data', 'fsdp', 'context', 'tensor']
logical_axis_rules: [
                      ['batch', ['data', 'fsdp']],
                      ['activation_batch', ['data', 'fsdp']],
                      ['activation_self_attn_heads', ['context', 'tensor']],
                      ['activation_cross_attn_q_length', ['context', 'tensor']],
                      ['activation_length', 'context'],
                      ['activation_heads', 'tensor'],
                      ['mlp','tensor'],
                      ['embed', ['context', 'fsdp']],
                      ['heads', 'tensor'],
                      ['norm', 'tensor'],
                      ['conv_batch', ['data', 'context', 'fsdp']],
                      ['out_channels', 'tensor'],
                      ['conv_out', 'context'],
                    ]
data_sharding: ['data', 'fsdp', 'context', 'tensor']

sharding:
  transformer: 'default'
  vae: 'default'
  text_connector: 'default'

dcn_data_parallelism: 1  # recommended DCN axis to be auto-sharded
dcn_fsdp_parallelism: -1

flash_block_sizes: {
  block_q: 2048,
  block_kv: 2048,
  block_kv_compute: 1024,
  block_q_dkv: 2048,
  block_kv_dkv: 2048,
  block_kv_dkv_compute: 2048,
  use_fused_bwd_kernel: True,
}
flash_min_seq_length: 4096
dcn_context_parallelism: 1
dcn_tensor_parallelism: 1
ici_data_parallelism: 1
ici_fsdp_parallelism: 1  
ici_context_parallelism: -1 # recommended ICI axis to be auto-sharded
ici_tensor_parallelism: 1
enable_profiler: False

# ML Diagnostics settings
enable_ml_diagnostics: True
profiler_gcs_path: ""
enable_ondemand_xprof: True
skip_first_n_steps_for_profiler: 0
profiler_steps: 5

# Enable JAX named scopes for detailed profiling and debugging
# When enabled, adds named scopes around key operations in transformer and attention layers
enable_jax_named_scopes: False

replicate_vae: False
use_bwe: False

run_text_encoder_on_tpu: False
# Dynamically disables VAE slicing and distributes the batch dimension to avoid HBM OOM for larger batch sizes.
enable_dynamic_vae_sharding: True
allow_split_physical_axes: False
learning_rate_schedule_steps: -1
max_train_steps: 500
pretrained_model_name_or_path: 'Lightricks/LTX-2'
model_name: "ltx2_video"
model_type: "T2V"
unet_checkpoint: ''
checkpoint_dir: ""
dataset_name: ''
train_split: 'train'
dataset_type: 'tfrecord'
cache_latents_text_encoder_outputs: True
per_device_batch_size: 1.0
compile_topology_num_slices: -1 
quantization_local_shard_count: -1
use_qwix_quantization: False
weight_quantization_calibration_method: "absmax"
act_quantization_calibration_method: "absmax"
bwd_quantization_calibration_method: "absmax"
qwix_module_path: ".*"
jit_initializers: True 
enable_single_replica_ckpt_restoring: False
seed: 0
audio_format: "s16"

# LoRA parameters
enable_lora: False

# Distilled LoRA
# lora_config: {
#   lora_model_name_or_path: ["Lightricks/LTX-2"],
#   weight_name: ["ltx-2-19b-distilled-lora-384.safetensors"],
#   adapter_name: ["distilled-lora-384"],
#   rank: [384]
# }

# Standard LoRA
lora_config: {
  lora_model_name_or_path: ["Lightricks/LTX-2-19b-LoRA-Camera-Control-Dolly-In"],
  weight_name: ["ltx-2-19b-lora-camera-control-dolly-in.safetensors"],
  adapter_name: ["camera-control-dolly-in"],
  rank: [32]
}


# LTX-2 Latent Upsampler
run_latent_upsampler: False
upsampler_model_path: "Lightricks/LTX-2"
upsampler_spatial_patch_size: 1
upsampler_temporal_patch_size: 1
upsampler_adain_factor: 0.0
upsampler_tone_map_compression_ratio: 0.0
upsampler_rational_spatial_scale: 2.0
upsampler_output_type: "pil"

aot_cache_dir: ''
converted_weights_dir: ''


# Tile-size auto-tuning. When enable_tile_search: True, generate_ltx2 runs a fast one-DiT-block
# grid search (maxdiffusion/utils/tile_size_grid_search.py) before inference and overwrites
# flash_block_sizes' block_q/block_kv/block_kv_compute with the winner. Default off (no-op).
enable_tile_search: False
tile_search_mode: 'smart'   # 'smart' (VMEM-capped candidate ladders) | 'full' (2D sweep)
tile_search_iters: 10
tile_search_out: ''         # dir for the results CSV; '' -> print only
