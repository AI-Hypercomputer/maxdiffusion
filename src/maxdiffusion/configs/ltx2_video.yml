#hardware
hardware: 'tpu'
skip_jax_distributed_system: False
attention: 'flash'
attention_sharding_uniform: True 
precision: 'bf16'
data_sharding: ['data', 'fsdp', 'context', 'tensor']
remat_policy: "NONE"
names_which_can_be_saved: []
names_which_can_be_offloaded: []

jax_cache_dir: ''
weights_dtype: 'bfloat16'
activations_dtype: 'bfloat16'

run_name: ''
output_dir: ''
config_path: ''
save_config_to_gcs: False

#Checkpoints
text_encoder_model_name_or_path: "ariG23498/t5-v1-1-xxl-flax"
prompt_enhancer_image_caption_model_name_or_path: "MiaoshouAI/Florence-2-large-PromptGen-v2.0"
prompt_enhancer_llm_model_name_or_path: "unsloth/Llama-3.2-3B-Instruct"
frame_rate: 30
max_sequence_length: 1024
sampler: "from_checkpoint"

# Generation parameters
global_batch_size_to_train_on: 1
num_inference_steps: 40
guidance_scale: 3.0
fps: 24
pipeline_type: multi-scale
prompt: "A cinematic, slow-motion shot inside a futuristic, neon-lit laboratory where a sleek, metallic robot with glowing blue eyes steps forward out of the shadows. In its metallic hands, it holds up a glowing holographic signboard that reads 'LTX-2' as sparks gently fall in the background. The camera slowly zooms in on the glowing text. The audio features a deep, booming cinematic bass drop, followed by a mechanical, robotic voice announcing, 'Welcome to the first video by LTX-2,' accompanied by the low, ambient hum of futuristic servers."
negative_prompt: "shaky, glitchy, low quality, worst quality, deformed, distorted, disfigured, motion smear, motion artifacts, fused fingers, bad anatomy, weird hand, ugly, transition, static."
height: 512
width: 768
num_frames: 161
decode_timestep: 0.05
decode_noise_scale: 0.025
quantization: "int8"
seed: 10
#parallelism
mesh_axes: ['data', 'fsdp', 'context', 'tensor']
logical_axis_rules: [
                      ['batch', 'data'],
                      ['activation_heads', 'fsdp'],
                      ['activation_batch', 'data'],
                      ['activation_kv', 'tensor'],
                      ['mlp','tensor'],
                      ['embed','fsdp'],
                      ['heads', 'tensor'],
                      ['norm', 'fsdp'],
                      ['conv_batch', ['data','fsdp']],
                      ['out_channels', 'tensor'],
                      ['conv_out', 'fsdp'],
                      ['conv_in', 'fsdp']
                    ]
dcn_data_parallelism: 1  # recommended DCN axis to be auto-sharded
dcn_fsdp_parallelism: -1
dcn_context_parallelism: 1
dcn_tensor_parallelism: 1
ici_data_parallelism: 1
ici_fsdp_parallelism: -1  # recommended ICI axis to be auto-sharded
ici_context_parallelism: 1
ici_tensor_parallelism: 1
enable_profiler: False

replicate_vae: False

allow_split_physical_axes: False
learning_rate_schedule_steps: -1
max_train_steps: 500
pretrained_model_name_or_path: 'Lightricks/LTX-2'
model_name: "ltx2_video"
model_type: "T2V"
unet_checkpoint: ''
checkpoint_dir: ""
dataset_name: 'diffusers/pokemon-gpt4-captions'
train_split: 'train'
dataset_type: 'tfrecord'
cache_latents_text_encoder_outputs: True
per_device_batch_size: 0.25
compile_topology_num_slices: -1 
quantization_local_shard_count: -1
use_qwix_quantization: False
weight_quantization_calibration_method: "absmax"
act_quantization_calibration_method: "absmax"
bwd_quantization_calibration_method: "absmax"
qwix_module_path: ".*"
jit_initializers: True 
enable_single_replica_ckpt_restoring: False
